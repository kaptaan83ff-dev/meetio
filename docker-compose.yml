services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok", "mongodb://localhost:27017/meetio"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
    env_file:
      - ./.env
    environment:
      APP_ENV: development
      FRONTEND_URL: http://localhost:5173
      MONGODB_URI: mongodb://mongo:27017/meetio
      MONGODB_DB_NAME: meetio
      REDIS_URL: redis://redis:6379/0
      EMAIL_TRANSPORT: mailpit
      MAILPIT_HOST: mailpit
      MAILPIT_PORT: 1025
      MAILPIT_USE_TLS: "false"
      WATCHFILES_FORCE_POLLING: "true"
    command: sh -c "python -m scripts.init_db && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir app --reload-dir scripts --reload-dir migrations --reload-exclude .pytest_cache --reload-exclude '**/.pytest_cache/**'"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"

  celery-worker:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
    env_file:
      - ./.env
    environment:
      APP_ENV: development
      FRONTEND_URL: http://localhost:5173
      MONGODB_URI: mongodb://mongo:27017/meetio
      MONGODB_DB_NAME: meetio
      REDIS_URL: redis://redis:6379/0
      EMAIL_TRANSPORT: mailpit
      MAILPIT_HOST: mailpit
      MAILPIT_PORT: 1025
      MAILPIT_USE_TLS: "false"
    command: celery -A app.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app

  celery-beat:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
    env_file:
      - ./.env
    environment:
      APP_ENV: development
      FRONTEND_URL: http://localhost:5173
      MONGODB_URI: mongodb://mongo:27017/meetio
      MONGODB_DB_NAME: meetio
      REDIS_URL: redis://redis:6379/0
      EMAIL_TRANSPORT: mailpit
      MAILPIT_HOST: mailpit
      MAILPIT_PORT: 1025
      MAILPIT_USE_TLS: "false"
    command: celery -A app.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      VITE_APP_ENV: development
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000
      VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
      VITE_LIVEKIT_URL: ${VITE_LIVEKIT_URL}
      VITE_SENTRY_DSN: ""
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"

volumes:
  mongo_data:
  redis_data:
  frontend_node_modules:
