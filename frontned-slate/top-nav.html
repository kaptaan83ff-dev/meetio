<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeetIO Navigation Component</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        /* ============================================
           NEO-BRUTALIST DESIGN TOKENS
           Exact match to your specifications
           ============================================ */
        :root {
            --canvas: #fff1e6;       /* Warm Cream */
            --ink: #0a0a0a;          /* Pure Black */
            --primary: #ffe500;      /* Sun Yellow */
            --secondary: #ff4f8b;    /* Electric Pink */
            --accent: #c6ff3d;       /* Lime Green */
            --blue-bright: #0066ff;  /* Power Blue */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 400;
            line-height: 1.55;
            color: var(--ink);
            background-color: var(--canvas);
            min-height: 100vh;
            position: relative;
        }

        .font-display { 
            font-family: 'Archivo Black', sans-serif; 
        }

        /* Background grid overlay */
        .dot-grid-overlay {
            background-image: radial-gradient(var(--ink) 1.5px, transparent 0);
            background-size: 20px 20px;
            opacity: 0.08;
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        /* ============================================
           NAVIGATION BAR - EXACT SPECIFICATIONS
           Height: 80px, White BG, 4px bottom border
           ============================================ */
        nav {
            height: 80px;
            background-color: white;
            border-bottom: 4px solid var(--ink);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        /* ============================================
           SECTION 1: LEFT - BRANDING (w-64 fixed width)
           With logo jiggle animation on hover
           ============================================ */
        .logo-container {
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            width: 256px; /* w-64 = 16rem = 256px */
        }

        .logo-box {
            width: 40px; /* w-10 = 2.5rem = 40px */
            height: 40px;
            background-color: var(--ink);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 3px 3px 0px 0px var(--ink);
            transition: transform 0.2s ease-in-out;
        }

        .logo-box i {
            color: white;
            font-size: 20px;
        }

        /* Logo Animation: Playful jiggle on hover */
        .logo-container:hover .logo-box { 
            animation: logoJiggle 0.5s ease-in-out infinite; 
        }

        @keyframes logoJiggle {
            0% { transform: rotate(0deg) scale(1.1); }
            25% { transform: rotate(-10deg) scale(1.1); }
            75% { transform: rotate(10deg) scale(1.1); }
            100% { transform: rotate(0deg) scale(1.1); }
        }

        .brand-text {
            font-family: 'Archivo Black', sans-serif;
            font-size: 24px; /* text-2xl = 1.5rem = 24px */
            letter-spacing: -0.05em; /* tracking-tighter */
            text-transform: uppercase;
            color: var(--ink);
        }

        /* ============================================
           SECTION 2: MIDDLE - PRIMARY NAVIGATION
           Physical Object Rule: 
           Hover lifts (-2px,-2px), Active pushes (+2px,+2px)
           ============================================ */
        #main-nav-links {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            flex: 1;
        }

        .nav-btn {
            font-family: 'Archivo Black', sans-serif;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            padding: 10px 20px;
            background-color: var(--canvas);
            border: 2px solid var(--ink);
            box-shadow: 4px 4px 0px 0px var(--ink);
            color: var(--ink);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            white-space: nowrap;
            cursor: pointer;
            position: relative;
        }

        /* Hover State: Lifts up, turns PINK */
        .nav-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 7px 7px 0px 0px var(--ink);
            background-color: var(--secondary); /* Turns pink on hover */
        }

        /* Active/Clicked State: Pushes down into page */
        .nav-btn:active,
        .nav-btn.active {
            background-color: var(--secondary);
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px 0px var(--ink);
            color: white;
        }

        /* ============================================
           SECTION 3: RIGHT - USER TOOLS & UTILITIES
           Perfectly square icons (42x42)
           Inverts colors on hover
           ============================================ */
        .nav-actions-right {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 16px;
            width: 256px; /* w-64 = 256px */
        }

        .action-btn {
            width: 42px;
            height: 42px;
            background-color: var(--ink);
            border: 2px solid var(--ink);
            box-shadow: 4px 4px 0px 0px var(--ink);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: var(--canvas);
            position: relative;
        }

        /* Action Button Hover: Inverts colors */
        .action-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px 0px var(--ink);
            background-color: var(--canvas);
            color: var(--ink);
        }

        .action-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px 0px var(--ink);
        }

        /* Notification Button Special: Pulse Animation */
        .notification-btn::before {
            content: '';
            position: absolute;
            top: -4px;
            right: -4px;
            width: 12px;
            height: 12px;
            background-color: var(--secondary);
            border-radius: 50%;
            animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite;
        }

        .notification-btn::after {
            content: '';
            position: absolute;
            top: -4px;
            right: -4px;
            width: 12px;
            height: 12px;
            background-color: var(--secondary);
            border: 2px solid var(--ink);
            border-radius: 50%;
        }

        @keyframes ping {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            75%, 100% {
                transform: scale(2);
                opacity: 0;
            }
        }

        /* Profile Badge Text */
        .profile-badge {
            font-family: 'Archivo Black', sans-serif;
            font-size: 10px;
            color: var(--canvas);
        }

        /* ============================================
           HAMBURGER MENU BUTTON (Mobile Only)
           ============================================ */
        .hamburger-btn {
            display: none;
            width: 42px;
            height: 42px;
            background-color: var(--ink);
            border: 2px solid var(--ink);
            box-shadow: 4px 4px 0px 0px var(--ink);
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: var(--canvas);
            position: relative;
            z-index: 110;
        }

        .hamburger-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px 0px var(--ink);
            background-color: var(--canvas);
            color: var(--ink);
        }

        .hamburger-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px 0px var(--ink);
        }

        .hamburger-btn i {
            font-size: 18px;
            transition: transform 0.3s ease;
        }

        .hamburger-btn.active i {
            transform: rotate(90deg);
        }

        /* ============================================
           MOBILE DROPDOWN MENU
           Expands downward with sections 2 & 3
           ============================================ */
        .mobile-menu-dropdown {
            display: none;
            position: absolute;
            top: 80px; /* Below the nav bar */
            left: 0;
            right: 0;
            background-color: white;
            border-bottom: 4px solid var(--ink);
            padding: 24px 20px;
            z-index: 99;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275),
                        padding 0.4s ease;
        }

        .mobile-menu-dropdown.open {
            display: block;
            max-height: 600px;
            overflow-y: auto;
        }

        /* Mobile Navigation Links Container */
        .mobile-nav-section {
            margin-bottom: 24px;
        }

        .mobile-nav-section-title {
            font-family: 'Archivo Black', sans-serif;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--ink);
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--ink);
        }

        /* Mobile Nav Buttons - Full Width Stack */
        .mobile-nav-links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .mobile-nav-btn {
            font-family: 'Archivo Black', sans-serif;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            padding: 14px 20px;
            background-color: var(--canvas);
            border: 2px solid var(--ink);
            box-shadow: 4px 4px 0px 0px var(--ink);
            color: var(--ink);
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            width: 100%;
            text-align: left;
        }

        .mobile-nav-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 7px 7px 0px 0px var(--ink);
            background-color: var(--secondary);
            color: white;
        }

        .mobile-nav-btn:active,
        .mobile-nav-btn.active {
            background-color: var(--secondary);
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px 0px var(--ink);
            color: white;
        }

        .mobile-nav-btn i {
            font-size: 16px;
            width: 20px;
            text-align: center;
        }

        /* Mobile Actions Row - All in One Line */
        .mobile-actions-row {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 12px;
            padding-top: 16px;
            border-top: 2px dashed var(--ink);
        }

        .mobile-action-btn {
            width: 48px;
            height: 48px;
            background-color: var(--ink);
            border: 2px solid var(--ink);
            box-shadow: 4px 4px 0px 0px var(--ink);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: var(--canvas);
            position: relative;
            flex-shrink: 0;
        }

        .mobile-action-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px 0px var(--ink);
            background-color: var(--canvas);
            color: var(--ink);
        }

        .mobile-action-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px 0px var(--ink);
        }

        .mobile-action-btn.notification-btn::before,
        .mobile-action-btn.notification-btn::after {
            content: '';
            position: absolute;
            top: -4px;
            right: -4px;
            width: 12px;
            height: 12px;
            background-color: var(--secondary);
            border-radius: 50%;
        }

        .mobile-action-btn.notification-btn::after {
            background-color: var(--secondary);
            border: 2px solid var(--ink);
            animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite;
        }

        .mobile-profile-badge {
            font-family: 'Archivo Black', sans-serif;
            font-size: 12px;
            color: var(--canvas);
        }

        /* ============================================
           RESPONSIVE ADJUSTMENTS
           ============================================ */
        
        /* Tablet Breakpoint */
        @media (max-width: 1024px) {
            nav {
                padding: 0 24px;
            }
            
            .logo-container,
            .nav-actions-right {
                width: auto;
            }
            
            #main-nav-links {
                gap: 8px;
            }
            
            .nav-btn {
                padding: 8px 14px;
                font-size: 10px;
            }
            
            .nav-btn span {
                display: none;
            }
        }

        /* Mobile Breakpoint - Hamburger Menu Activates */
        @media (max-width: 768px) {
            nav {
                height: 80px;
                flex-wrap: nowrap;
                padding: 0 20px;
                position: relative;
            }
            
            /* Show Logo on Left */
            .logo-container {
                order: 1;
                width: auto;
                flex: 0 0 auto;
            }
            
            /* Hide Middle Navigation (Section 2) */
            #main-nav-links {
                display: none;
            }
            
            /* Hide Right Actions (Section 3) */
            .nav-actions-right {
                display: none;
            }
            
            /* Show Hamburger Button on Right */
            .hamburger-btn {
                display: flex;
                order: 2;
                margin-left: auto;
            }
            
            /* Mobile Dropdown Menu Styling */
            .mobile-menu-dropdown {
                position: fixed;
                top: 80px;
                left: 0;
                right: 0;
                background-color: white;
                border-bottom: 4px solid var(--ink);
                box-shadow: 0 8px 0px 0px rgba(10, 10, 10, 0.1);
            }
        }

        /* Small Mobile Optimization */
        @media (max-width: 480px) {
            nav {
                padding: 0 16px;
            }
            
            .logo-box {
                width: 36px;
                height: 36px;
            }
            
            .logo-box i {
                font-size: 18px;
            }
            
            .brand-text {
                font-size: 20px;
            }
            
            .mobile-menu-dropdown {
                padding: 20px 16px;
            }
            
            .mobile-nav-btn {
                padding: 12px 16px;
                font-size: 12px;
            }
            
            .mobile-action-btn {
                width: 44px;
                height: 44px;
            }
        }
    </style>
</head>
<body class="relative min-h-screen">

    <!-- Background Dot Grid Overlay -->
    <div class="dot-grid-overlay"></div>

    <!-- ==========================================
         MAIN NAVIGATION BAR COMPONENT
         Exact replica with responsive hamburger menu
         ========================================== -->
    <nav>
        
        <!-- SECTION 1: LEFT (Branding) - Always Visible -->
        <div class="logo-container">
            <div class="logo-box">
                <i class="fa-solid fa-video"></i>
            </div>
            <span class="brand-text">MEETIO</span>
        </div>
        
        <!-- SECTION 2: MIDDLE (Primary Navigation) - Hidden on Mobile -->
        <div id="main-nav-links">
            <button class="nav-btn active" onclick="setActiveNav(this)">
                <i class="fa-solid fa-table-cells"></i>
                <span>Dashboard</span>
            </button>
            <button class="nav-btn" onclick="setActiveNav(this)">
                <i class="fa-regular fa-calendar-check"></i>
                <span>Calendar</span>
            </button>
            <button class="nav-btn" onclick="setActiveNav(this)">
                <i class="fa-regular fa-comment-dots"></i>
                <span>Messenger</span>
            </button>
            <button class="nav-btn" onclick="setActiveNav(this)">
                <i class="fa-solid fa-list-check"></i>
                <span>Tasks</span>
            </button>
            <button class="nav-btn" onclick="setActiveNav(this)">
                <i class="fa-solid fa-video"></i>
                <span>Meetings</span>
            </button>
        </div>
        
        <!-- SECTION 3: RIGHT (User Tools & Utilities) - Hidden on Mobile -->
        <div class="nav-actions-right">
            <button class="action-btn notification-btn" title="Notifications">
                <i class="fa-solid fa-bell"></i>
            </button>
            <button class="action-btn" title="Settings">
                <i class="fa-solid fa-gear"></i>
            </button>
            <button class="action-btn" title="User Profile">
                <span class="profile-badge">SM</span>
            </button>
        </div>

        <!-- HAMBURGER BUTTON (Only visible on Mobile) -->
        <button class="hamburger-btn" id="hamburgerBtn" onclick="toggleMobileMenu()" title="Menu">
            <i class="fa-solid fa-bars"></i>
        </button>

    </nav>

    <!-- MOBILE DROPDOWN MENU (Contains Sections 2 & 3) -->
    <div class="mobile-menu-dropdown" id="mobileMenuDropdown">
        
        <!-- Section 2: Navigation Links (Stacked Vertically) -->
        <div class="mobile-nav-section">
            <div class="mobile-nav-section-title">Navigation</div>
            <div class="mobile-nav-links">
                <button class="mobile-nav-btn active" onclick="setActiveMobileNav(this)">
                    <i class="fa-solid fa-table-cells"></i>
                    <span>Dashboard</span>
                </button>
                <button class="mobile-nav-btn" onclick="setActiveMobileNav(this)">
                    <i class="fa-regular fa-calendar-check"></i>
                    <span>Calendar</span>
                </button>
                <button class="mobile-nav-btn" onclick="setActiveMobileNav(this)">
                    <i class="fa-regular fa-comment-dots"></i>
                    <span>Messenger</span>
                </button>
                <button class="mobile-nav-btn" onclick="setActiveMobileNav(this)">
                    <i class="fa-solid fa-list-check"></i>
                    <span>Tasks</span>
                </button>
                <button class="mobile-nav-btn" onclick="setActiveMobileNav(this)">
                    <i class="fa-solid fa-video"></i>
                    <span>Meetings</span>
                </button>
            </div>
        </div>

        <!-- Section 3: User Tools & Utilities (All in One Horizontal Line) -->
        <div class="mobile-nav-section">
            <div class="mobile-nav-section-title">Quick Actions</div>
            <div class="mobile-actions-row">
                <button class="mobile-action-btn notification-btn" title="Notifications">
                    <i class="fa-solid fa-bell"></i>
                </button>
                <button class="mobile-action-btn" title="Settings">
                    <i class="fa-solid fa-gear"></i>
                </button>
                <button class="mobile-action-btn" title="User Profile">
                    <span class="mobile-profile-badge">SM</span>
                </button>
            </div>
        </div>

    </div>

    <!-- UI Interaction Helper Script -->
    <script>
        // ============================================
        // DESKTOP NAVIGATION HANDLER
        // ============================================
        function setActiveNav(clickedElement) {
            const navButtons = document.querySelectorAll('#main-nav-links .nav-btn');
            navButtons.forEach(btn => btn.classList.remove('active'));
            clickedElement.classList.add('active');
            console.log('Navigated to:', clickedElement.querySelector('span').textContent.trim());
        }
        
        // ============================================
        // MOBILE NAVIGATION HANDLER
        // ============================================
        function setActiveMobileNav(clickedElement) {
            const mobileNavButtons = document.querySelectorAll('.mobile-nav-btn');
            mobileNavButtons.forEach(btn => btn.classList.remove('active'));
            clickedElement.classList.add('active');
            
            // Also sync with desktop nav if visible
            const navText = clickedElement.querySelector('span').textContent.trim();
            const desktopButtons = document.querySelectorAll('#main-nav-links .nav-btn');
            desktopButtons.forEach(btn => {
                if (btn.querySelector('span').textContent.trim() === navText) {
                    setActiveNav(btn);
                }
            });
            
            console.log('Mobile Navigated to:', navText);
            
            // Optional: Close menu after selection (uncomment if desired)
            // toggleMobileMenu();
        }

        // ============================================
        // HAMBURGER MENU TOGGLE
        // ============================================
        function toggleMobileMenu() {
            const hamburgerBtn = document.getElementById('hamburgerBtn');
            const mobileMenu = document.getElementById('mobileMenuDropdown');
            
            // Toggle classes
            hamburgerBtn.classList.toggle('active');
            mobileMenu.classList.toggle('open');
            
            // Log state
            const isOpen = mobileMenu.classList.contains('open');
            console.log(isOpen ? '📱 Mobile Menu OPENED' : '📱 Mobile Menu CLOSED');
            
            // Prevent body scroll when menu is open
            if (isOpen) {
                document.body.style.overflow = 'hidden';
            } else {
                document.body.style.overflow = '';
            }
        }

        // ============================================
        // EVENT LISTENERS INITIALIZATION
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            
            // Desktop Action Buttons
            const notifBtn = document.querySelector('.nav-actions-right .notification-btn');
            if (notifBtn) {
                notifBtn.addEventListener('click', function() {
                    console.log('🔔 Notifications clicked');
                });
            }
            
            const settingsBtn = document.querySelector('.nav-actions-right .action-btn[title="Settings"]');
            if (settingsBtn) {
                settingsBtn.addEventListener('click', function() {
                    console.log('⚙️ Settings clicked');
                });
            }
            
            const profileBtn = document.querySelector('.nav-actions-right .action-btn[title="User Profile"]');
            if (profileBtn) {
                profileBtn.addEventListener('click', function() {
                    console.log('👤 Profile clicked');
                });
            }
            
            // Logo Click
            const logoContainer = document.querySelector('.logo-container');
            if (logoContainer) {
                logoContainer.addEventListener('click', function() {
                    console.log('🏠 Logo clicked - Go to home');
                });
            }

            // Mobile Action Buttons
            const mobileNotifBtn = document.querySelector('.mobile-action-btn.notification-btn');
            if (mobileNotifBtn) {
                mobileNotifBtn.addEventListener('click', function() {
                    console.log('🔔 Mobile Notifications clicked');
                });
            }
            
            const mobileSettingsBtn = document.querySelector('.mobile-actions-row .mobile-action-btn[title="Settings"]');
            if (mobileSettingsBtn) {
                mobileSettingsBtn.addEventListener('click', function() {
                    console.log('⚙️ Mobile Settings clicked');
                });
            }
            
            const mobileProfileBtn = document.querySelector('.mobile-actions-row .mobile-action-btn[title="User Profile"]');
            if (mobileProfileBtn) {
                mobileProfileBtn.addEventListener('click', function() {
                    console.log('👤 Mobile Profile clicked');
                });
            }

            // Close mobile menu when clicking outside
            document.addEventListener('click', function(event) {
                const mobileMenu = document.getElementById('mobileMenuDropdown');
                const hamburgerBtn = document.getElementById('hamburgerBtn');
                
                if (mobileMenu.classList.contains('open')) {
                    if (!mobileMenu.contains(event.target) && !hamburgerBtn.contains(event.target)) {
                        toggleMobileMenu();
                    }
                }
            });

            // Close menu on Escape key
            document.addEventListener('keydown', function(event) {
                if (event.key === 'Escape') {
                    const mobileMenu = document.getElementById('mobileMenuDropdown');
                    if (mobileMenu.classList.contains('open')) {
                        toggleMobileMenu();
                    }
                }
            });

            // Handle window resize - close mobile menu if switching to desktop
            window.addEventListener('resize', function() {
                if (window.innerWidth > 768) {
                    const mobileMenu = document.getElementById('mobileMenuDropdown');
                    const hamburgerBtn = document.getElementById('hamburgerBtn');
                    
                    if (mobileMenu.classList.contains('open')) {
                        mobileMenu.classList.remove('open');
                        hamburgerBtn.classList.remove('active');
                        document.body.style.overflow = '';
                    }
                }
            });

            console.log('%c✅ MeetIO Navigation Loaded!', 'font-size: 18px; font-weight: bold; color: #ff4f8b;');
            console.log('%c🎨 Neo-Brutalist Design System Active', 'color: #22c55e;');
            console.log('%c⚡ Physical Object Interaction Model:', 'color: #0066ff;');
            console.log('   • Hover: Lifts UP (-2px, -2px)');
            console.log('   • Click: Pushes DOWN (+2px, +2px)');
            console.log('   • Color: Turns PINK on hover/active');
            console.log('%c📱 Responsive Features:', 'color: #c6ff3d;');
            console.log('   • Desktop (>768px): Full 3-section layout');
            console.log('   • Mobile (≤768px): Hamburger menu with dropdown');
