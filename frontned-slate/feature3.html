<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Management - Neo-Brutalist UI</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Babel for JSX/TSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* CSS Reset */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Design Tokens - Neo-Brutalism */
        :root {
            --color-canvas: #fff1e6;
            --color-border: #0a0a0a;
            --color-text-primary: #0a0a0a;
            --color-text-secondary: #4a4a4a;
            --color-accent-yellow: #ffe500;
            --color-window-pink: #ff6b9d;
            --color-window-yellow: #ffd93d;
            --color-window-lime: #c8ff00;
            --color-white: #ffffff;
            --color-danger-red: #ff4444;

            /* Typography */
            --font-heading: 'Archivo Black', sans-serif;
            --font-body: 'Inter', sans-serif;

            /* Spacing */
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
            --spacing-xxl: 48px;

            /* Borders & Shadows */
            --border-thick: 3px solid var(--color-border);
            --border-thin: 2px solid var(--color-border);
            --shadow-hard: 4px 4px 0px 0px var(--color-border);
            --shadow-hard-hover: 6px 6px 0px 0px var(--color-border);
            --shadow-hard-active: 2px 2px 0px 0px var(--color-border);
        }

        /* Base Styles */
        body {
            font-family: var(--font-body);
            background-color: var(--color-canvas);
            color: var(--color-text-primary);
            line-height: 1.6;
            min-height: 100vh;
            padding: var(--spacing-xl);
        }

        /* Main Container */
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Neo-Brutalist Ledger Window Component */
        .ledger-window {
            background-color: var(--color-white);
            border: var(--border-thick);
            box-shadow: var(--shadow-hard);
            position: relative;
            overflow: hidden;
        }

        /* Window Chrome - Three Dot Controls */
        .window-chrome {
            background-color: var(--color-canvas);
            border-bottom: var(--border-thick);
            padding: var(--spacing-sm) var(--spacing-md);
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .chrome-dot {
            width: 12px;
            height: 12px;
            border: var(--border-thin);
            border-radius: 50%;
        }

        .chrome-dot--pink { background-color: var(--color-window-pink); }
        .chrome-dot--yellow { background-color: var(--color-window-yellow); }
        .chrome-dot--lime { background-color: var(--color-window-lime); }

        /* Window Content Area */
        .window-content {
            padding: var(--spacing-lg);
        }

        /* Section Header Styles */
        .section-header {
            margin-bottom: var(--spacing-xl);
        }

        .section-title {
            font-family: var(--font-heading);
            font-size: 32px;
            text-transform: uppercase;
            color: var(--color-text-primary);
            letter-spacing: -0.5px;
            margin-bottom: var(--spacing-sm);
            line-height: 1.2;
        }

        .section-subtitle {
            font-family: var(--font-body);
            font-size: 14px;
            color: var(--color-text-secondary);
            line-height: 1.5;
        }

        /* Sessions Grid Layout */
        .sessions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: var(--spacing-lg);
        }

        /* Session Card Styles */
        .session-card {
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .session-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: var(--shadow-hard-hover);
        }

        .session-card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-md);
        }

        .session-device-info {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            flex: 1;
        }

        .device-icon {
            width: 48px;
            height: 48px;
            border: var(--border-thick);
            background-color: var(--color-canvas);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .device-icon svg {
            width: 24px;
            height: 24px;
            stroke: var(--color-text-primary);
            stroke-width: 2;
            fill: none;
        }

        .device-details h3 {
            font-family: var(--font-body);
            font-size: 16px;
            font-weight: 600;
            color: var(--color-text-primary);
            margin-bottom: 2px;
        }

        .device-details p {
            font-size: 13px;
            color: var(--color-text-secondary);
        }

        /* Status Badge */
        .status-badge {
            background-color: var(--color-accent-yellow);
            border: var(--border-thin);
            padding: var(--spacing-xs) var(--spacing-sm);
            font-family: var(--font-heading);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .session-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: var(--spacing-md);
            border-top: var(--border-thin);
            font-size: 13px;
            color: var(--color-text-secondary);
        }

        .location-info {
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
        }

        .timestamp {
            font-style: italic;
        }

        /* Revoke Button - Secondary Inverted Style */
        .btn-revoke {
            background-color: var(--color-text-primary);
            color: var(--color-accent-yellow);
            border: var(--border-thick);
            padding: var(--spacing-sm) var(--spacing-md);
            font-family: var(--font-heading);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            box-shadow: var(--shadow-hard);
            transition: all 0.15s ease;
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-xs);
        }

        .btn-revoke:hover {
            transform: translate(-2px, -2px);
            box-shadow: var(--shadow-hard-hover);
            background-color: var(--color-danger-red);
            color: var(--color-white);
        }

        .btn-revoke:active {
            transform: translate(0, 0);
            box-shadow: var(--shadow-hard-active);
        }

        .btn-revoke svg {
            width: 14px;
            height: 14px;
            stroke-width: 2.5;
        }

        /* Modal Overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(10, 10, 10, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
            padding: var(--spacing-md);
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* Modal Dialog */
        .modal-dialog {
            background-color: var(--color-white);
            border: var(--border-thick);
            box-shadow: 8px 8px 0px 0px var(--color-border);
            max-width: 440px;
            width: 100%;
            transform: scale(0.9) translateY(20px);
            transition: transform 0.2s ease;
        }

        .modal-overlay.active .modal-dialog {
            transform: scale(1) translateY(0);
        }

        .modal-header {
            padding: var(--spacing-lg);
            border-bottom: var(--border-thin);
        }

        .modal-title {
            font-family: var(--font-heading);
            font-size: 20px;
            text-transform: uppercase;
            color: var(--color-text-primary);
            letter-spacing: -0.3px;
            line-height: 1.3;
        }

        .modal-body {
            padding: var(--spacing-lg);
        }

        .modal-message {
            font-family: var(--font-body);
            font-size: 14px;
            color: var(--color-text-secondary);
            line-height: 1.6;
            margin-bottom: var(--spacing-sm);
        }

        .modal-device-name {
            font-weight: 600;
            color: var(--color-text-primary);
            background-color: var(--color-canvas);
            border: var(--border-thin);
            padding: var(--spacing-xs) var(--spacing-sm);
            display: inline-block;
            margin-top: var(--spacing-sm);
        }

        .modal-footer {
            padding: var(--spacing-lg);
            border-top: var(--border-thin);
            display: flex;
            gap: var(--spacing-sm);
            justify-content: flex-end;
        }

        /* Modal Buttons */
        .btn-modal {
            padding: var(--spacing-sm) var(--spacing-lg);
            font-family: var(--font-heading);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: var(--border-thick);
            cursor: pointer;
            transition: all 0.15s ease;
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-xs);
        }

        .btn-cancel {
            background-color: var(--color-white);
            color: var(--color-text-primary);
            box-shadow: var(--shadow-hard);
        }

        .btn-cancel:hover {
            transform: translate(-2px, -2px);
            box-shadow: var(--shadow-hard-hover);
        }

        .btn-confirm {
            background-color: var(--color-danger-red);
            color: var(--color-white);
            box-shadow: var(--shadow-hard);
        }

        .btn-confirm:hover {
            transform: translate(-2px, -2px);
            box-shadow: var(--shadow-hard-hover);
            background-color: #cc0000;
        }

        .btn-modal:active {
            transform: translate(0, 0);
            box-shadow: var(--shadow-hard-active);
        }

        /* Login History Table Styles */
        .history-table {
            width: 100%;
            border-collapse: collapse;
            font-family: var(--font-body);
        }

        .history-table thead {
            background-color: var(--color-canvas);
            border-bottom: var(--border-thick);
        }

        .history-table th {
            padding: var(--spacing-md) var(--spacing-lg);
            text-align: left;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--color-text-secondary);
            border-bottom: var(--border-thin);
        }

        .history-table th:last-child {
            text-align: right;
        }

        .history-table tbody tr {
            border-bottom: var(--border-thin);
            transition: background-color 0.15s ease;
        }

        .history-table tbody tr:hover {
            background-color: rgba(255, 229, 0, 0.1);
        }

        .history-table tbody tr:nth-child(even) {
            background-color: rgba(255, 241, 230, 0.3);
        }

        .history-table td {
            padding: var(--spacing-md) var(--spacing-lg);
            font-size: 14px;
            color: var(--color-text-primary);
            vertical-align: middle;
        }

        .history-table td:last-child {
            text-align: right;
            white-space: nowrap;
        }

        /* Event Badge Styles */
        .event-badge {
            display: inline-block;
            padding: var(--spacing-xs) var(--spacing-sm);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: var(--border-thin);
        }

        .event-badge--success {
            background-color: #c8ff00;
            color: var(--color-text-primary);
        }

        .event-badge--security {
            background-color: var(--color-accent-yellow);
            color: var(--color-text-primary);
        }

        .event-badge--warning {
            background-color: var(--color-window-yellow);
            color: var(--color-text-primary);
        }

        .event-badge--danger {
            background-color: var(--color-danger-red);
            color: var(--color-white);
        }

        /* Location Cell */
        .location-cell {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .ip-address {
            font-size: 12px;
            color: var(--color-text-secondary);
            font-family: monospace;
        }

        /* Loading Indicator */
        .loading-indicator {
            padding: var(--spacing-lg);
            text-align: center;
            border-top: var(--border-thin);
            background-color: var(--color-canvas);
        }

        .loading-text {
            font-family: var(--font-heading);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--color-text-secondary);
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-sm);
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .loading-dots {
            display: inline-flex;
            gap: 4px;
        }

        .loading-dot {
            width: 6px;
            height: 6px;
            background-color: var(--color-accent-yellow);
            border: var(--border-thin);
            animation: bounce 1.4s ease-in-out infinite both;
        }

        .loading-dot:nth-child(1) { animation-delay: -0.32s; }
        .loading-dot:nth-child(2) { animation-delay: -0.16s; }
        .loading-dot:nth-child(3) { animation-delay: 0s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            body { padding: var(--spacing-md); }
            .section-title { font-size: 24px; }
            .sessions-grid { grid-template-columns: 1fr; }
            .session-card-header { flex-direction: column; }
            .status-badge { align-self: flex-start; }
            .session-meta { flex-direction: column; align-items: flex-start; }
            .btn-revoke { width: 100%; justify-content: center; }
            .modal-dialog { max-width: 100%; margin: var(--spacing-md); }
            .modal-footer { flex-direction: column; }
            .btn-modal { width: 100%; justify-content: center; }
        }

        @media (max-width: 480px) {
            .section-title { font-size: 20px; }
            .device-icon { width: 40px; height: 40px; }
            .device-details h3 { font-size: 14px; }
            .event-badge { font-size: 10px; padding: 2px 6px; }
        }

        /* Focus States for Accessibility */
        button:focus-visible,
        a:focus-visible {
            outline: 3px solid var(--color-accent-yellow);
            outline-offset: 2px;
        }

        /* Smooth Scroll Behavior */
        html { scroll-behavior: smooth; }

        /* Selection Styling */
        ::selection {
            background-color: var(--color-accent-yellow);
            color: var(--color-text-primary);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- REACT (TSX) CODE STARTS HERE -->
    <script type="text/babel" data-type="module">
        const { useState, useEffect, useCallback } = React;

        // ============================================
        // TYPE DEFINITIONS
        // ============================================

        interface Session {
            id: string;
            deviceType: 'desktop' | 'mobile' | 'tablet';
            browser: string;
            os: string;
            deviceName?: string;
            location: {
                city: string;
                country: string;
            };
            ipAddress: string;
            lastActive: string;
            isCurrentSession: boolean;
        }

        interface LoginHistoryEvent {
            id: string;
            eventType: 'sign_in' | 'sign_out' | '2fa_verified' | 'password_changed' | 'failed_sign_in';
            device: string;
            location: {
                city: string;
                country: string;
            };
            ipAddress: string;
            timestamp: string;
        }

        interface RevokeModalState {
            isOpen: boolean;
            sessionId: string | null;
            deviceName: string;
        }

        // ============================================
        // SVG ICON COMPONENTS
        // ============================================

        const DesktopIcon = () => (
            <svg viewBox="0 0 24 24" strokeLinecap="round" strokeLinejoin="round">
                <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                <line x1="8" y1="21" x2="16" y2="21"></line>
                <line x1="12" y1="17" x2="12" y2="21"></line>
            </svg>
        );

        const MobileIcon = () => (
            <svg viewBox="0 0 24 24" strokeLinecap="round" strokeLinejoin="round">
                <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
                <line x1="12" y1="18" x2="12.01" y2="18"></line>
            </svg>
        );

        const LocationIcon = () => (
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                <circle cx="12" cy="10" r="3"></circle>
            </svg>
        );

        const LogoutIcon = () => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
        );

        const getDeviceIcon = (deviceType) => {
            switch (deviceType) {
                case 'mobile': return <MobileIcon />;
                case 'desktop':
                default: return <DesktopIcon />;
            }
        };

        // ============================================
        // LEDGER WINDOW COMPONENT
        // ============================================

        const LedgerWindow = ({ children, className = '' }) => (
            <div className={`ledger-window ${className}`}>
                {children}
            </div>
        );

        const WindowChrome = () => (
            <div className="window-chrome">
                <span className="chrome-dot chrome-dot--pink"></span>
                <span className="chrome-dot chrome-dot--yellow"></span>
                <span className="chrome-dot chrome-dot--lime"></span>
            </div>
        );

        // ============================================
        // SECTION HEADER COMPONENT
        // ============================================

        const SectionHeader = ({ title, subtitle }) => (
            <div className="section-header">
                <h2 className="section-title">{title}</h2>
                <p className="section-subtitle">{subtitle}</p>
            </div>
        );

        // ============================================
        // SESSION CARD COMPONENT
        // ============================================

        const SessionCard = ({ session, onRevoke }) => (
            <article className="ledger-window session-card">
                <WindowChrome />
                <div className="window-content">
                    <div className="session-card-header">
                        <div className="session-device-info">
                            <div className="device-icon">
                                {getDeviceIcon(session.deviceType)}
                            </div>
                            <div className="device-details">
                                <h3>{`${session.browser} on ${session.os}`}</h3>
                                <p>{session.deviceName || `${session.deviceType.charAt(0).toUpperCase() + session.deviceType.slice(1)}${session.isCurrentSession ? ' • Current Device' : ''}`}</p>
                            </div>
                        </div>
                        {session.isCurrentSession && (
                            <span className="status-badge">Current Session</span>
                        )}
                    </div>
                    <div className="session-meta">
                        <div className="location-info">
                            <LocationIcon />
                            <span>{`${session.location.city}, ${session.location.country}`}</span>
                        </div>
                        {!session.isCurrentSession ? (
                            <button 
                                className="btn-revoke" 
                                onClick={() => onRevoke(session.id, `${session.browser} on ${session.os}`)}
                                aria-label={`Revoke session on ${session.browser} on ${session.os}`}
                            >
                                <LogoutIcon />
                                Revoke
                            </button>
                        ) : (
                            <span className="timestamp">Active now</span>
                        )}
                        {!session.isCurrentSession && (
                            <span className="timestamp">Active {session.lastActive}</span>
                        )}
                    </div>
                </div>
            </article>
        );

        // ============================================
        // SESSIONS SECTION COMPONENT
        // ============================================

        const SessionsSection = ({ sessions, onRevokeSession }) => (
            <section className="sessions-section" id="sessions-section">
                <SectionHeader 
                    title="Active Sessions"
                    subtitle="Manage devices currently logged into your account. Revoke access from any device you don't recognize."
                />
                <div className="sessions-grid">
                    {sessions.map((session) => (
                        <SessionCard 
                            key={session.id} 
                            session={session} 
                            onRevoke={onRevokeSession}
                        />
                    ))}
                </div>
            </section>
        );

        // ============================================
        // EVENT BADGE COMPONENT
        // ============================================

        const EventBadge = ({ eventType }) => {
            const eventConfig = {
                sign_in: { label: 'Sign-in', className: 'event-badge--success' },
                sign_out: { label: 'Sign-out', className: 'event-badge--warning' },
                '2fa_verified': { label: '2FA Verified', className: 'event-badge--security' },
                password_changed: { label: 'Password Changed', className: 'event-badge--warning' },
                failed_sign_in: { label: 'Failed Sign-in', className: 'event-badge--danger' },
            };

            const config = eventConfig[eventType] || { label: eventType.replace(/_/g, ' '), className: 'event-badge--success' };

            return (
                <span className={`event-badge ${config.className}`}>
                    {config.label}
                </span>
            );
        };

        // ============================================
        // LOGIN HISTORY SECTION COMPONENT
        // ============================================

        const LoginHistorySection = ({ events, isLoading }) => (
            <section className="login-history-section" id="login-history-section">
                <SectionHeader 
                    title="Security Audit Log"
                    subtitle="Review your authentication history from the last 90 days. Monitor for any suspicious activity."
                />
                <LedgerWindow className="history-table-container">
                    <WindowChrome />
                    <div className="window-content" style={{ padding: 0, overflowX: 'auto' }}>
                        <table className="history-table">
                            <thead>
                                <tr>
                                    <th>Event</th>
                                    <th>Device</th>
                                    <th>Location</th>
                                    <th>Date / Time</th>
                                </tr>
                            </thead>
                            <tbody id="historyTableBody">
                                {events.map((event) => (
                                    <tr key={event.id}>
                                        <td><EventBadge eventType={event.eventType} /></td>
                                        <td>{event.device}</td>
                                        <td>
                                            <div className="location-cell">
                                                <span>{`${event.location.city}, ${event.location.country}`}</span>
                                                <span className="ip-address">{event.ipAddress}</span>
                                            </div>
                                        </td>
                                        <td>{event.timestamp}</td>
                                    </tr>
                                ))}
                            </tbody>
                            <tfoot>
                                <tr>
                                    <td colSpan={4}>
                                        <div className="loading-indicator">
                                            <div className="loading-text">
                                                Loading More
                                                <span className="loading-dots">
                                                    <span className="loading-dot"></span>
                                                    <span className="loading-dot"></span>
                                                    <span className="loading-dot"></span>
                                                </span>
                                            </div>
                                        </div>
                                    </td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>
                </LedgerWindow>
            </section>
        );

        // ============================================
        // REVOKE MODAL COMPONENT
        // ============================================

        const RevokeModal = ({ modalState, onClose, onConfirm }) => {
            useEffect(() => {
                const handleEscape = (e) => {
                    if (e.key === 'Escape') onClose();
                };

                if (modalState.isOpen) {
                    document.addEventListener('keydown', handleEscape);
                    document.body.style.overflow = 'hidden';
                }

                return () => {
                    document.removeEventListener('keydown', handleEscape);
                    document.body.style.overflow = 'unset';
                };
            }, [modalState.isOpen, onClose]);

            const handleOverlayClick = (e) => {
                if (e.target === e.currentTarget) onClose();
            };

            return (
                <div 
                    className={`modal-overlay ${modalState.isOpen ? 'active' : ''}`}
                    onClick={handleOverlayClick}
                >
                    <div className="modal-dialog ledger-window">
                        <WindowChrome />
                        <div className="modal-header">
                            <h3 className="modal-title">Sign Out of This Device?</h3>
                        </div>
                        <div className="modal-body">
                            <p className="modal-message">
                                This action will immediately end the session on this device. The user will need to sign in again to access your account.
                            </p>
                            <div className="modal-device-name">{modalState.deviceName}</div>
                        </div>
                        <div className="modal-footer">
                            <button className="btn-modal btn-cancel" onClick={onClose}>
                                Cancel
                            </button>
                            <button className="btn-modal btn-confirm" onClick={onConfirm}>
                                <LogoutIcon />
                                Confirm Revoke
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // ============================================
        // MOCK DATA LAYER (settingsApi.ts equivalent)
        // ============================================

        const settingsApi = {
            getSessions: async () => {
                await new Promise(resolve => setTimeout(resolve, 500));
                
                return [
                    {
                        id: 'session-1',
                        deviceType: 'desktop',
                        browser: 'Chrome',
                        os: 'Windows',
                        location: { city: 'New York', country: 'United States' },
                        ipAddress: '192.168.1.0',
                        lastActive: '',
                        isCurrentSession: true,
                    },
                    {
                        id: 'session-2',
                        deviceType: 'mobile',
                        browser: 'Safari',
                        os: 'iOS',
                        deviceName: 'iPhone 14 Pro',
                        location: { city: 'London', country: 'United Kingdom' },
                        ipAddress: '192.168.1.24',
                        lastActive: '23 minutes ago',
                        isCurrentSession: false,
                    },
                    {
                        id: 'session-3',
                        deviceType: 'desktop',
                        browser: 'Firefox',
                        os: 'macOS',
                        deviceName: 'MacBook Pro',
                        location: { city: 'Tokyo', country: 'Japan' },
                        ipAddress: '192.168.1.56',
                        lastActive: '2 hours ago',
                        isCurrentSession: false,
                    },
                    {
                        id: 'session-4',
                        deviceType: 'desktop',
                        browser: 'Edge',
                        os: 'Windows',
                        deviceName: 'Desktop PC',
                        location: { city: 'Sydney', country: 'Australia' },
                        ipAddress: '192.168.1.89',
                        lastActive: '1 day ago',
                        isCurrentSession: false,
                    },
                ];
            },

            revokeSession: async (id) => {
                console.log(`Revoking session: ${id}`);
                await new Promise(resolve => setTimeout(resolve, 300));
            },

            getLoginHistory: async () => {
                await new Promise(resolve => setTimeout(resolve, 500));
                
                return [
                    {
                        id: 'event-1',
                        eventType: 'sign_in',
                        device: 'Chrome on Windows',
                        location: { city: 'New York', country: 'United States' },
                        ipAddress: '192.168.1.0',
                        timestamp: 'May 3, 2026, 04:12 PM',
                    },
                    {
                        id: 'event-2',
                        eventType: '2fa_verified',
                        device: 'Safari on iOS (iPhone 14)',
                        location: { city: 'London', country: 'United Kingdom' },
                        ipAddress: '192.168.1.24',
                        timestamp: 'May 3, 2026, 03:45 PM',
                    },
                    {
                        id: 'event-3',
                        eventType: 'sign_in',
                        device: 'Firefox on macOS',
                        location: { city: 'Tokyo', country: 'Japan' },
                        ipAddress: '192.168.1.56',
                        timestamp: 'May 2, 2026, 11:20 PM',
                    },
                    {
                        id: 'event-4',
                        eventType: 'password_changed',
                        device: 'Chrome on Windows',
                        location: { city: 'San Francisco', country: 'United States' },
                        ipAddress: '192.168.1.0',
                        timestamp: 'May 2, 2026, 09:15 AM',
                    },
                    {
                        id: 'event-5',
                        eventType: 'sign_in',
                        device: 'Edge on Windows',
                        location: { city: 'Sydney', country: 'Australia' },
                        ipAddress: '192.168.1.89',
                        timestamp: 'May 1, 2026, 06:30 PM',
                    },
                    {
                        id: 'event-6',
                        eventType: 'failed_sign_in',
                        device: 'Unknown Device',
                        location: { city: 'Berlin', country: 'Germany' },
                        ipAddress: '192.168.1.142',
                        timestamp: 'May 1, 2026, 02:18 AM',
                    },
                ];
            },
        };

        // ============================================
        // MAIN APP COMPONENT
        // ============================================

        const App = () => {
            const [sessions, setSessions] = useState([]);
            const [loginEvents, setLoginEvents] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [revokeModal, setRevokeModal] = useState({
                isOpen: false,
                sessionId: null,
                deviceName: '',
            });

            useEffect(() => {
                const fetchData = async () => {
                    try {
                        const [sessionsData, historyData] = await Promise.all([
                            settingsApi.getSessions(),
                            settingsApi.getLoginHistory(),
                        ]);
                        setSessions(sessionsData);
                        setLoginEvents(historyData);
                    } catch (error) {
                        console.error('Error fetching data:', error);
                    } finally {
                        setIsLoading(false);
                    }
                };

                fetchData();
            }, []);

            const handleOpenRevokeModal = useCallback((sessionId, deviceName) => {
                setRevokeModal({
                    isOpen: true,
                    sessionId,
                    deviceName,
                });
            }, []);

            const handleCloseRevokeModal = useCallback(() => {
                setRevokeModal({
                    isOpen: false,
                    sessionId: null,
                    deviceName: '',
                });
            }, []);

            const handleConfirmRevoke = useCallback(async () => {
                if (revokeModal.sessionId) {
                    try {
                        await settingsApi.revokeSession(revokeModal.sessionId);
                        setSessions(prev => prev.filter(s => s.id !== revokeModal.sessionId));
                        handleCloseRevokeModal();
                    } catch (error) {
                        console.error('Error revoking session:', error);
                    }
                }
            }, [revokeModal.sessionId, handleCloseRevokeModal]);

            if (isLoading) {
                return (
                    <div className="main-container" style={{ textAlign: 'center', padding: '100px 0' }}>
                        <div className="loading-text" style={{ fontSize: '16px' }}>
                            Loading...
                        </div>
                    </div>
                );
            }

            return (
                <div className="main-container" id="app">
                    <SessionsSection 
                        sessions={sessions} 
                        onRevokeSession={handleOpenRevokeModal}
                    />
                    <LoginHistorySection 
                        events={loginEvents} 
                        isLoading={isLoading}
                    />
                    <RevokeModal 
                        modalState={revokeModal}
                        onClose={handleCloseRevokeModal}
                        onConfirm={handleConfirmRevoke}
                    />
                </div>
            );
        };

        // ============================================
        // RENDER APPLICATION
        // ============================================

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
