<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeetIO — Sign Up</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  --canvas: #fff1e6;
  --ink: #0a0a0a;
  --primary: #ffe500;
  --secondary: #ff4f8b;
  --accent-lime: #c6ff3d;
  --accent-blue: #0052ff;
  --ghost: #ffffff;
  --text-primary: #0a0a0a;
  --text-muted: rgba(10,10,10,0.6);
  --shadow-hard: 4px 4px 0px 0px #0a0a0a;
  --shadow-hover: 7px 7px 0px 0px #0a0a0a;
  --shadow-active: 1px 1px 0px 0px #0a0a0a;
  --shadow-yellow: 4px 4px 0px 0px #ffe500;
  --font-display: 'Archivo Black', sans-serif;
  --font-body: 'Inter', sans-serif;
  --font-mono: 'Courier New', monospace;
  --border-thin: 1px solid #0a0a0a;
  --border-default: 2px solid #0a0a0a;
  --border-heavy: 3px solid #0a0a0a;
  --transition-fast: 100ms ease-out;
  --transition-base: 200ms ease-out;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-body);font-size:16px;font-weight:500;line-height:1.55;color:var(--text-primary);background:var(--canvas);min-height:100vh;overflow-x:hidden;position:relative}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background-image:radial-gradient(circle,rgba(10,10,10,.08) 1.5px,transparent 1.5px);background-size:20px 20px;pointer-events:none;z-index:0}

/* TOAST */
.toast-container{position:fixed;top:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:16px;max-width:420px;width:calc(100% - 48px);pointer-events:none}
.toast{display:flex;align-items:flex-start;gap:12px;padding:16px 20px;background:var(--ghost);border:var(--border-heavy);box-shadow:var(--shadow-hard);border-radius:2px;animation:toastIn .3s cubic-bezier(.21,1.02,.73,1);pointer-events:auto;position:relative;overflow:hidden}
.toast.removing{animation:toastOut .25s cubic-bezier(.55,0,.95,.45) forwards}
@keyframes toastIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes toastOut{from{transform:translateX(0);opacity:1;max-height:300px}to{transform:translateX(120%);opacity:0;max-height:0;padding-top:0;padding-bottom:0}}
.toast-success{border-left:6px solid var(--accent-lime)}
.toast-error{border-left:6px solid var(--secondary)}
.toast-warning{border-left:6px solid var(--primary)}
.toast-info{border-left:6px solid var(--accent-blue)}
.toast-icon{flex-shrink:0;width:32px;height:32px;border:var(--border-default);display:flex;align-items:center;justify-content:center;font-size:14px}
.toast-success .toast-icon{background:var(--accent-lime)}
.toast-error .toast-icon{background:var(--secondary)}
.toast-warning .toast-icon{background:var(--primary)}
.toast-info .toast-icon{background:var(--accent-blue);color:#fff}
.toast-content{flex:1;min-width:0}
.toast-title{font-family:var(--font-display);font-size:11px;font-weight:900;letter-spacing:.5px;text-transform:uppercase;color:var(--ink);margin-bottom:4px}
.toast-message{font-size:13px;color:var(--text-muted);line-height:1.5}
.toast-close{flex-shrink:0;width:28px;height:28px;border:var(--border-default);background:var(--ghost);color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all var(--transition-fast)}
.toast-close:hover{background:var(--primary);transform:translate(-1px,-1px);box-shadow:2px 2px 0 0 #000}
.toast-progress{position:absolute;bottom:0;left:0;height:3px;background:var(--ink);animation:progressShrink linear forwards}
.toast-success .toast-progress{background:var(--accent-lime)}
.toast-error .toast-progress{background:var(--secondary)}
.toast-warning .toast-progress{background:var(--primary)}
.toast-info .toast-progress{background:var(--accent-blue)}
@keyframes progressShrink{from{width:100%}to{width:0%}}

/* LAYOUT */
.auth-container{display:flex;min-height:100vh;position:relative;z-index:1}

/* LEFT PANEL — ANIMATED BLOCKS */
.auth-branding{flex:0 0 45%;background:var(--ink);display:flex;align-items:stretch;justify-content:stretch;position:relative;border-right:var(--border-heavy);overflow:hidden}
.blocks-grid{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(5,1fr);width:100%;height:100%;gap:0}
.block{border:1px solid rgba(255,229,0,.15);cursor:pointer;transition:transform .2s cubic-bezier(.34,1.56,.64,1),background .2s ease,box-shadow .2s ease;position:relative;overflow:hidden}
.block::after{content:'';position:absolute;inset:0;opacity:0;transition:opacity .2s ease}
.block:hover{transform:scale(1.08);z-index:10;box-shadow:0 0 0 3px #ffe500}
.block:hover::after{opacity:1}
.block.b1{background:#ffe500}.block.b1:hover{background:#ffed4a}
.block.b2{background:#ff4f8b}.block.b2:hover{background:#ff6fa0}
.block.b3{background:#c6ff3d}.block.b3:hover{background:#d4ff66}
.block.b4{background:#0052ff}.block.b4:hover{background:#3373ff}
.block.b5{background:#ff6b35}.block.b5:hover{background:#ff8555}
.block.b6{background:#1a1a1a}.block.b6:hover{background:#2d2d2d;box-shadow:0 0 0 3px #ffe500}
.block.b7{background:#7c3aed}.block.b7:hover{background:#8b5cf6}
.block.b8{background:#00d4aa}.block.b8:hover{background:#00e6b8}
.block.b9{background:#ff4f8b;opacity:.6}.block.b9:hover{opacity:1}
.block.b10{background:#ffe500;opacity:.4}.block.b10:hover{opacity:1}
.block.b11{background:#c6ff3d;opacity:.5}.block.b11:hover{opacity:1}
.block.b12{background:#0052ff;opacity:.3}.block.b12:hover{opacity:1}
.block.b13{background:#1a1a1a}.block.b13:hover{background:#111}
.block.b14{background:#ffe500;opacity:.7}.block.b14:hover{opacity:1}
.block.b15{background:#ff4f8b;opacity:.3}.block.b15:hover{opacity:1}
.block.b16{background:#c6ff3d;opacity:.8}.block.b16:hover{opacity:1}
.block.b17{background:#0052ff;opacity:.6}.block.b17:hover{opacity:1}
.block.b18{background:#1a1a1a}.block.b18:hover{background:#333}
.block.b19{background:#7c3aed;opacity:.5}.block.b19:hover{opacity:1}
.block.b20{background:#00d4aa;opacity:.4}.block.b20:hover{opacity:1}

/* pulsing blocks */
@keyframes pulse-block{0%,100%{opacity:.7}50%{opacity:1}}
.block.pulse{animation:pulse-block 2s ease-in-out infinite}
.block:nth-child(3n){animation-delay:.4s}
.block:nth-child(5n){animation-delay:.8s}

/* RIGHT PANEL */
.auth-form-panel{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:48px 32px;background:var(--canvas);position:relative;overflow-y:auto}
.auth-form-container{width:100%;max-width:480px}
.ledger-window{background:var(--ghost);border:var(--border-heavy);box-shadow:var(--shadow-hard);border-radius:2px;overflow:hidden}
.window-chrome{height:40px;background:var(--primary);border-bottom:var(--border-default);display:flex;align-items:center;padding:0 16px;gap:8px}
.chrome-dots{display:flex;gap:6px}
.chrome-dot{width:12px;height:12px;border:var(--border-thin);border-radius:50%}
.chrome-dot.pink{background:var(--secondary)}
.chrome-dot.yellow{background:var(--primary);border-color:#000}
.chrome-dot.lime{background:var(--accent-lime)}
.chrome-title{flex:1;text-align:center;font-family:var(--font-mono);font-size:11px;font-weight:700;letter-spacing:1px;color:var(--ink);text-transform:uppercase}
.window-body{padding:32px;background:var(--ghost);position:relative}
.window-body::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background-image:radial-gradient(circle,rgba(10,10,10,.04) 1.5px,transparent 1.5px);background-size:20px 20px;pointer-events:none}
.division-label{font-family:var(--font-display);font-size:11px;font-weight:900;letter-spacing:.8px;text-transform:uppercase;color:var(--text-muted);margin-bottom:24px;display:block;opacity:.7}
.auth-header{margin-bottom:24px;text-align:center;position:relative;z-index:1}
.auth-header h1{font-family:var(--font-display);font-size:28px;font-weight:900;letter-spacing:-.8px;color:var(--ink);margin-bottom:8px;line-height:1.1;text-transform:uppercase}
.auth-header p{color:var(--text-muted);font-size:14px;font-weight:500}

/* FORM */
.form-group{margin-bottom:20px;position:relative;z-index:1}
.form-label{display:block;font-family:var(--font-display);font-size:11px;font-weight:900;letter-spacing:.6px;text-transform:uppercase;color:var(--ink);margin-bottom:8px}
.form-input-wrapper{position:relative}
.form-input{width:100%;padding:14px 16px 14px 44px;border:var(--border-default);background:var(--ghost);font-family:var(--font-body);font-size:15px;font-weight:500;color:var(--ink);border-radius:2px;transition:all var(--transition-fast);outline:none}
.form-input:focus{background:var(--primary);border-color:var(--ink);box-shadow:var(--shadow-hard);transform:translate(-2px,-2px)}
.form-input.error{border-color:var(--secondary);background:#fff5f7}
.input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:16px;pointer-events:none}
.password-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:transparent;border:var(--border-thin);color:var(--text-muted);cursor:pointer;padding:6px 10px;font-size:14px;transition:all var(--transition-fast);border-radius:2px}
.password-toggle:hover{background:var(--primary);color:var(--ink);border-color:var(--ink)}
.form-error{display:flex;align-items:center;gap:8px;color:var(--secondary);font-size:12px;font-weight:700;margin-top:8px;font-family:var(--font-display);letter-spacing:.3px;text-transform:uppercase;animation:shake .4s ease-in-out;padding:8px 12px;background:#fff5f7;border:var(--border-thin);border-left:3px solid var(--secondary)}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* PASSWORD STRENGTH BAR */
.password-strength-wrap{margin-top:10px;position:relative;z-index:1}
.password-strength{display:flex;gap:6px;margin-bottom:10px}
.strength-bar{flex:1;height:6px;background:var(--canvas);border:var(--border-thin);border-radius:0;transition:background .3s ease,border-color .3s ease}
.strength-bar.weak{background:var(--secondary);border-color:var(--ink)}
.strength-bar.medium{background:var(--primary);border-color:var(--ink)}
.strength-bar.strong{background:var(--accent-lime);border-color:var(--ink)}

/* PASSWORD RULES */
.password-rules{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:2px}
.rule-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border:var(--border-thin);background:var(--canvas);font-family:var(--font-display);font-size:10px;font-weight:900;letter-spacing:.5px;text-transform:uppercase;color:var(--text-muted);transition:all .25s ease;border-radius:2px}
.rule-item .rule-dot{width:14px;height:14px;border-radius:50%;border:2px solid currentColor;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .25s ease;font-size:9px}
.rule-item.met{color:var(--ink);background:#f4ffe0;border-color:var(--accent-lime)}
.rule-item.met .rule-dot{background:var(--accent-lime);border-color:var(--accent-lime);color:var(--ink)}
.rule-item.met .rule-dot::after{content:'✓';font-size:9px;font-weight:900}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;padding:16px 24px;font-family:var(--font-display);font-size:12px;font-weight:900;letter-spacing:.8px;text-transform:uppercase;border:var(--border-default);cursor:pointer;transition:all var(--transition-base);text-decoration:none;width:100%;border-radius:2px;position:relative;z-index:1}
.btn-primary{background:var(--primary);color:var(--ink);box-shadow:var(--shadow-hard)}
.btn-primary:hover:not(:disabled){transform:translate(-2px,-2px);box-shadow:var(--shadow-hover)}
.btn-primary:active:not(:disabled){transform:translate(2px,2px);box-shadow:var(--shadow-active)}
.btn-primary:disabled{background:var(--canvas);color:var(--text-muted);cursor:not-allowed;box-shadow:none}
.btn-google{background:var(--ghost);color:var(--ink);box-shadow:var(--shadow-hard);margin-bottom:16px}
.btn-google:hover{transform:translate(-2px,-2px);box-shadow:var(--shadow-hover)}
.btn-google img{width:18px;height:18px;border:var(--border-thin)}

/* DIVIDER */
.divider{display:flex;align-items:center;margin:20px 0;color:var(--text-muted);font-family:var(--font-display);font-size:11px;font-weight:900;letter-spacing:.8px;text-transform:uppercase}
.divider::before,.divider::after{content:'';flex:1;height:2px;background:var(--ink)}
.divider span{padding:0 16px;background:var(--ghost)}

/* LINKS */
.auth-link{color:var(--ink);text-decoration:none;font-weight:700;border-bottom:2px solid var(--primary);transition:all var(--transition-fast);padding-bottom:1px}
.auth-link:hover{background:var(--primary)}
.auth-footer{text-align:center;margin-top:24px;color:var(--text-muted);font-size:13px;font-weight:500;position:relative;z-index:1}
.form-checkbox{display:flex;align-items:flex-start;gap:12px;position:relative;z-index:1}
.form-checkbox input[type="checkbox"]{appearance:none;width:20px;height:20px;border:var(--border-default);background:var(--ghost);cursor:pointer;position:relative;flex-shrink:0;margin-top:2px}
.form-checkbox input[type="checkbox"]:checked{background:var(--primary)}
.form-checkbox input[type="checkbox"]:checked::after{content:'✓';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:14px;font-weight:900;color:var(--ink)}
.form-checkbox label{font-size:13px;color:var(--text-muted);cursor:pointer;line-height:1.5}

/* SPINNER */
.spinner{width:18px;height:18px;border:3px solid var(--ink);border-top-color:transparent;animation:spin .6s linear infinite;border-radius:50%}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none!important}

/* TOP NAV */
.top-nav{position:fixed;top:0;left:0;right:0;z-index:500;background:var(--ghost);border-bottom:var(--border-default);display:flex;align-items:center;gap:4px;padding:8px 16px;box-shadow:0 2px 0 0 #0a0a0a}
.top-nav a{padding:8px 14px;border:var(--border-thin);background:transparent;border-radius:2px;cursor:pointer;font-family:var(--font-display);font-size:10px;font-weight:900;letter-spacing:.6px;text-transform:uppercase;color:var(--ink);transition:all var(--transition-base);text-decoration:none;white-space:nowrap}
.top-nav a:hover{background:var(--canvas);transform:translate(-1px,-1px);box-shadow:2px 2px 0 0 #000}
.top-nav a.active{background:var(--primary);box-shadow:var(--shadow-hard)}
.top-nav-logo{font-family:var(--font-display);font-size:16px;color:var(--ink);margin-right:12px;border-right:var(--border-default);padding-right:12px}
body{padding-top:52px}

/* RESPONSIVE */
@media(max-width:900px){
  .auth-branding{display:none}
  body{padding-top:52px}
}
@media(max-width:600px){
  .auth-form-panel{padding:24px 16px}
  .window-body{padding:24px 20px}
  .top-nav{gap:2px;padding:6px 8px}
  .top-nav a{padding:6px 8px;font-size:9px}
  .password-rules{grid-template-columns:1fr}
  .toast-container{top:16px;right:8px;left:8px;max-width:none;width:auto}
}
</style>
</head>
<body>

<div id="toast-container" class="toast-container"></div>

<nav class="top-nav">
  <span class="top-nav-logo">MeetIO</span>
  <a href="signup.html" class="active">Sign Up</a>
  <a href="signin.html">Sign In</a>
  <a href="reset-password.html">Reset</a>
  <a href="verify-otp.html">Verify OTP</a>
  <a href="toast-demo.html">Toasts</a>
</nav>

<div class="auth-container">
  <!-- LEFT: ANIMATED BLOCKS -->
  <div class="auth-branding">
    <div class="blocks-grid" id="blocks-grid"></div>
  </div>

  <!-- RIGHT: SIGN UP FORM -->
  <div class="auth-form-panel">
    <div class="auth-form-container">
      <div class="ledger-window">
        <div class="window-chrome">
          <div class="chrome-dots">
            <div class="chrome-dot pink"></div>
            <div class="chrome-dot yellow"></div>
            <div class="chrome-dot lime"></div>
          </div>
          <div class="chrome-title">Auth Module • Sign Up</div>
          <div style="width:52px"></div>
        </div>
        <div class="window-body">
          <span class="division-label">Division • Auth / 01</span>
          <div class="auth-header">
            <h1>Create Account</h1>
          </div>

          <button type="button" class="btn btn-google" onclick="handleGoogleAuth()">
            <img src="https://www.google.com/favicon.ico" alt="G"> Continue with Google
          </button>
          <div class="divider"><span>or use email</span></div>

          <form id="signup-form" onsubmit="handleSignup(event)">
            <div class="form-group">
              <label class="form-label" for="signup-name">Full Name</label>
              <div class="form-input-wrapper">
                <input type="text" id="signup-name" class="form-input" placeholder="HolloW Knight      " required autocomplete="name">
                <i class="fas fa-user input-icon"></i>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="signup-email">Work Email</label>
              <div class="form-input-wrapper">
                <input type="email" id="signup-email" class="form-input" placeholder="user@meetio.com" required autocomplete="email">
                <i class="fas fa-envelope input-icon"></i>
              </div>
              <div class="form-error hidden" id="signup-email-error">
                <i class="fas fa-exclamation"></i> Invalid Email Format
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="signup-password">Password</label>
              <div class="form-input-wrapper">
                <input type="password" id="signup-password" class="form-input" placeholder="Create strong password" required minlength="8" autocomplete="new-password" oninput="updatePasswordUI(this.value,'signup')">
                <i class="fas fa-lock input-icon"></i>
                <button type="button" class="password-toggle" onclick="togglePassword('signup-password',this)">
                  <i class="fas fa-eye"></i>
                </button>
              </div>
              <!-- STRENGTH BAR -->
              <div class="password-strength-wrap">
                <div class="password-strength" id="signup-strength-bars">
                  <div class="strength-bar" id="signup-s1"></div>
                  <div class="strength-bar" id="signup-s2"></div>
                  <div class="strength-bar" id="signup-s3"></div>
                  <div class="strength-bar" id="signup-s4"></div>
                </div>
                <!-- 4 RULES -->
                <div class="password-rules" id="signup-rules">
                  <div class="rule-item" id="signup-rule-len">
                    <span class="rule-dot"></span>8+ Characters
                  </div>
                  <div class="rule-item" id="signup-rule-num">
                    <span class="rule-dot"></span>Number (0-9)
                  </div>
                  <div class="rule-item" id="signup-rule-sym">
                    <span class="rule-dot"></span>Symbol (@#$!)
                  </div>
                  <div class="rule-item" id="signup-rule-upper">
                    <span class="rule-dot"></span>Uppercase (A-Z)
                  </div>
                </div>
              </div>
            </div>

            <div class="form-group" style="margin-top:20px">
              <div class="form-checkbox">
                <input type="checkbox" id="signup-terms" required>
                <label for="signup-terms">I agree to the <a href="#" class="auth-link">Terms of Service</a> and <a href="#" class="auth-link">Privacy Policy</a></label>
              </div>
            </div>

            <button type="submit" class="btn btn-primary" id="signup-submit">Create Account</button>
          </form>

          <div class="auth-footer">
            Already have an account? <a href="signin.html" class="auth-link">Sign In</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// TOAST
const ToastManager = (() => {
  const container = document.getElementById('toast-container');
  let count = 0;
  function show(type, title, message, options = {}) {
    const { duration = 5000, showProgress = true, action = null } = options;
    if (container.children.length >= 5) removeToast(container.firstChild);
    const toast = document.createElement('div');
    toast.className = `toast toast-${type}`;
    toast.id = `toast-${++count}`;
    const icons = { success:'check', error:'times', warning:'exclamation', info:'info' };
    toast.innerHTML = `
      <div class="toast-icon"><i class="fas fa-${icons[type]}"></i></div>
      <div class="toast-content">
        <div class="toast-title">${esc(title)}</div>
        <div class="toast-message">${esc(message)}</div>
        ${action ? `<div style="margin-top:10px"><button style="padding:6px 12px;font-family:var(--font-display);font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.5px;border:var(--border-default);background:var(--primary);cursor:pointer" class="toast-action-btn">${esc(action.text)}</button></div>` : ''}
      </div>
      <button class="toast-close"><i class="fas fa-times"></i></button>
      ${showProgress ? `<div class="toast-progress" style="animation-duration:${duration}ms"></div>` : ''}`;
    container.appendChild(toast);
    toast.querySelector('.toast-close').addEventListener('click', () => removeToast(toast));
    if (action) toast.querySelector('.toast-action-btn')?.addEventListener('click', () => { action.onClick(); removeToast(toast); });
    if (duration > 0) setTimeout(() => { if (toast.parentNode) removeToast(toast); }, duration);
  }
  function removeToast(toast) {
    if (!toast || !toast.parentNode) return;
    toast.classList.add('removing');
    setTimeout(() => { if (toast.parentNode) toast.parentNode.removeChild(toast); }, 250);
  }
  function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
  return {
    success:(t,m,o)=>show('success',t,m,o),
    error:(t,m,o)=>show('error',t,m,o),
    warning:(t,m,o)=>show('warning',t,m,o),
    info:(t,m,o)=>show('info',t,m,o)
  };
})();

// ANIMATED BLOCKS
const BLOCK_CLASSES = ['b1','b2','b3','b4','b5','b6','b7','b8','b9','b10','b11','b12','b13','b14','b15','b16','b17','b18','b19','b20'];
function buildBlocks() {
  const grid = document.getElementById('blocks-grid');
  if (!grid) return;
  const total = 20;
  for (let i = 0; i < total; i++) {
    const b = document.createElement('div');
    b.className = `block ${BLOCK_CLASSES[i % BLOCK_CLASSES.length]}`;
    if (Math.random() > 0.6) b.classList.add('pulse');
    grid.appendChild(b);
  }
}
buildBlocks();

// PASSWORD
function togglePassword(id, btn) {
  const el = document.getElementById(id);
  const ic = btn.querySelector('i');
  if (el.type === 'password') { el.type = 'text'; ic.classList.replace('fa-eye','fa-eye-slash'); }
  else { el.type = 'password'; ic.classList.replace('fa-eye-slash','fa-eye'); }
}

function getPasswordRules(pw) {
  return {
    len: pw.length >= 8,
    num: /[0-9]/.test(pw),
    sym: /[^A-Za-z0-9]/.test(pw),
    upper: /[A-Z]/.test(pw)
  };
}

function updatePasswordUI(pw, prefix) {
  const rules = getPasswordRules(pw);
  const met = Object.values(rules).filter(Boolean).length;

  // Update rule items
  setRule(`${prefix}-rule-len`, rules.len);
  setRule(`${prefix}-rule-num`, rules.num);
  setRule(`${prefix}-rule-sym`, rules.sym);
  setRule(`${prefix}-rule-upper`, rules.upper);

  // Strength bars
  const level = pw.length === 0 ? 0 : met <= 1 ? 1 : met <= 2 ? 2 : met <= 3 ? 3 : 4;
  const colorClass = level <= 1 ? 'weak' : level <= 3 ? 'medium' : 'strong';
  for (let i = 1; i <= 4; i++) {
    const bar = document.getElementById(`${prefix}-s${i}`);
    bar.className = 'strength-bar';
    if (i <= level && pw.length > 0) bar.classList.add(colorClass);
  }
}

function setRule(id, met) {
  const el = document.getElementById(id);
  if (!el) return;
  if (met) el.classList.add('met'); else el.classList.remove('met');
}

function validateEmail(e) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }

function handleSignup(e) {
  e.preventDefault();
  const email = document.getElementById('signup-email').value;
  const pw = document.getElementById('signup-password').value;
  if (!validateEmail(email)) { ToastManager.error('Invalid Email','Enter a valid email address.'); document.getElementById('signup-email').classList.add('error'); return; }
  const rules = getPasswordRules(pw);
  if (!rules.len) { ToastManager.error('Weak Password','Minimum 8 characters required.'); return; }
  const btn = document.getElementById('signup-submit');
  btn.innerHTML = '<span class="spinner"></span> Creating...'; btn.disabled = true;
  ToastManager.info('Creating Account','Setting up your MeetIO workspace...', { duration: 3000 });
  setTimeout(() => {
    ToastManager.success('Account Created!', `Welcome! Verification sent to ${email}.`, { duration: 6000, action: { text: 'Verify Now →', onClick: () => { window.location.href = 'verify-otp.html'; } } });
    btn.innerHTML = 'Create Account'; btn.disabled = false;
    setTimeout(() => window.location.href = 'verify-otp.html', 1800);
  }, 2000);
}

function handleGoogleAuth() {
  ToastManager.info('Redirecting…','Opening Google secure authentication…', { duration: 4000 });
  setTimeout(() => ToastManager.success('Google Auth OK!','Authenticated via Google. Setting up session…'), 2500);
}
